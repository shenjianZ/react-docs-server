# 开发环境配置 - SQLite 数据库
[server]
host = "0.0.0.0"
port = 3000
cors_allowed_origins = ["http://localhost:5173", "http://127.0.0.1:5173"]

[database]
# 数据库类型: mysql, sqlite, postgresql
database_type = "sqlite"

# MySQL/PostgreSQL 配置
# host = "localhost"
# port = 3306
# user = "root"
# password = "root"
# database = "web_template"

# SQLite 配置（当 database_type = "sqlite" 时使用）
path = "data/app.db"

# 连接池配置
max_connections = 10

[auth]
jwt_secret = "9f7d3c7a564dfkopp26smb2644nqzfvbsao9f7d3c7a1a8f28544b5e6d7a"
frontend_base_url = "http://localhost:5173"
# 分开配置两个 token 的过期时间
access_token_expiration_minutes = 15   # access_token 15 分钟
refresh_token_expiration_days = 7      # refresh_token 7 天

[auth.email_verification]
code_ttl_seconds = 300
send_interval_seconds = 60
subject_prefix = "[React Docs]"

[auth.email_verification.smtp]
enabled = false
host = "smtp.example.com"
port = 587
username = ""
password = ""
from_email = "noreply@example.com"
from_name = "React Docs"
starttls = true

[auth.providers.google]
enabled = false
client_id = ""
client_secret = ""
redirect_uri = "http://localhost:3000/api/auth/oauth/google/callback"
scopes = ["openid", "email", "profile"]

[auth.providers.github]
enabled = false
client_id = ""
client_secret = ""
redirect_uri = "http://localhost:3000/api/auth/oauth/github/callback"
scopes = ["read:user", "user:email"]

[auth.providers.wechat]
enabled = false
client_id = ""
client_secret = ""
redirect_uri = "http://localhost:3000/api/auth/oauth/wechat/callback"

[auth.providers.qq]
enabled = false
client_id = ""
client_secret = ""
redirect_uri = "http://localhost:3000/api/auth/oauth/qq/callback"

[redis]
host = "localhost"
port = 6379
password = ""  # 可选
db = 0
