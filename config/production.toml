# 生产环境配置 - 默认 PostgreSQL（请按需修改）
[server]
host = "0.0.0.0"
port = 3000
cors_allowed_origins = ["https://your-domain.com"]

[database]
database_type = "postgresql"
host = "localhost"
port = 5432
user = "postgres"
password = "change-me"
database = "react_docs"
max_connections = 20

[auth]
jwt_secret = "change-this-to-a-strong-secret-key-in-production"
frontend_base_url = "https://your-domain.com"
access_token_expiration_minutes = 15
refresh_token_expiration_days = 7

[auth.email_verification]
code_ttl_seconds = 300
send_interval_seconds = 60
subject_prefix = "[React Docs]"

[auth.email_verification.smtp]
enabled = false
host = "smtp.example.com"
port = 587
username = ""
password = ""
from_email = "noreply@example.com"
from_name = "React Docs"
starttls = true

[auth.providers.google]
enabled = false
client_id = ""
client_secret = ""
redirect_uri = "https://api.your-domain.com/api/auth/oauth/google/callback"
scopes = ["openid", "email", "profile"]

[auth.providers.github]
enabled = false
client_id = ""
client_secret = ""
redirect_uri = "https://api.your-domain.com/api/auth/oauth/github/callback"
scopes = ["read:user", "user:email"]

[auth.providers.wechat]
enabled = false
client_id = ""
client_secret = ""
redirect_uri = "https://api.your-domain.com/api/auth/oauth/wechat/callback"

[auth.providers.qq]
enabled = false
client_id = ""
client_secret = ""
redirect_uri = "https://api.your-domain.com/api/auth/oauth/qq/callback"

[redis]
host = "localhost"
port = 6379
password = ""
db = 0
